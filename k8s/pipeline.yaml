apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pipeline
  template:
    metadata:
      labels:
        app: pipeline
    spec:
      containers:
        - name: pipeline
          image: daya-data-pipeline:latest
          command: ["/app/worker"]
          env:
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: ENV
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: HEALTH_PORT
              value: "8081"
          ports:
            - containerPort: 8081
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: pipeline
spec:
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: pipeline
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pipeline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pipeline
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
