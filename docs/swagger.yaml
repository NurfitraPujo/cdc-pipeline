basePath: /api/v1
definitions:
  protocol.GlobalConfig:
    properties:
      batch_size:
        type: integer
      batch_wait:
        example: 5s
        type: string
      retry:
        $ref: '#/definitions/protocol.RetryConfig'
    type: object
  protocol.HistoryPoint:
    properties:
      lag_ms:
        type: integer
      rps:
        type: number
      timestamp:
        type: string
    type: object
  protocol.PipelineConfig:
    properties:
      batch_size:
        description: Override
        type: integer
      batch_wait:
        description: Override
        example: 10s
        type: string
      id:
        type: string
      name:
        type: string
      processors:
        items:
          $ref: '#/definitions/protocol.ProcessorConfig'
        type: array
      retry:
        $ref: '#/definitions/protocol.RetryConfig'
      sinks:
        items:
          type: string
        type: array
      sources:
        items:
          type: string
        type: array
      tables:
        items:
          type: string
        type: array
    type: object
  protocol.ProcessorConfig:
    properties:
      name:
        type: string
      options:
        additionalProperties: true
        type: object
      type:
        description: e.g., "mask", "filter", "custom"
        type: string
    type: object
  protocol.RetryConfig:
    properties:
      enable_dlq:
        type: boolean
      initial_interval:
        example: 1s
        type: string
      max_interval:
        example: 30s
        type: string
      max_retries:
        type: integer
    type: object
  protocol.SinkConfig:
    properties:
      dsn:
        description: Data Source Name
        type: string
      id:
        type: string
      type:
        description: e.g., "databend"
        type: string
    type: object
  protocol.SourceConfig:
    properties:
      batch_size:
        type: integer
      batch_wait:
        example: 5s
        type: string
      database:
        type: string
      discovery_interval:
        example: 30s
        type: string
      host:
        type: string
      id:
        type: string
      pass:
        type: string
      port:
        type: integer
      publication_name:
        type: string
      schemas:
        items:
          type: string
        type: array
      slot_name:
        type: string
      snapshot_chunk_size:
        type: integer
      snapshot_interval:
        example: 1s
        type: string
      tables:
        items:
          type: string
        type: array
      type:
        description: e.g., "postgres"
        type: string
      user:
        type: string
    type: object
  protocol.StatsSummary:
    properties:
      avg_lag_ms:
        type: integer
      error_count:
        type: integer
      healthy_count:
        type: integer
      total_pipelines:
        type: integer
      total_rows_synced:
        type: integer
      transitioning_count:
        type: integer
    type: object
  protocol.TableMetadata:
    properties:
      columns:
        items:
          type: string
        type: array
      id:
        type: string
      name:
        type: string
      pk_columns:
        items:
          type: string
        type: array
      types:
        items:
          type: string
        type: array
    type: object
  protocol.WorkerHeartbeat:
    properties:
      status:
        type: string
      updated_at:
        type: string
      uptime_sec:
        type: integer
      worker_id:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Control plane API for managing CDC data pipelines.
  title: CDC Data Pipeline API
  version: "1.0"
paths:
  /global:
    get:
      description: Retrieve global batching settings
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/protocol.GlobalConfig'
        "404":
          description: not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get global configuration
      tags:
      - config
    put:
      consumes:
      - application/json
      description: Update global batching settings and reload all pipelines
      parameters:
      - description: Global Config
        in: body
        name: config
        required: true
        schema:
          $ref: '#/definitions/protocol.GlobalConfig'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/protocol.GlobalConfig'
        "429":
          description: too many requests
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Update global configuration
      tags:
      - config
  /login:
    post:
      consumes:
      - application/json
      description: Get a JWT token for authorized requests
      parameters:
      - description: Username and Password
        in: body
        name: credentials
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: token
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Authenticate user
      tags:
      - auth
  /pipelines:
    get:
      description: Retrieve pipeline configurations with search, status filtering,
        and pagination
      parameters:
      - description: Search by name or ID
        in: query
        name: search
        type: string
      - description: Filter by status (Healthy, Error, Transitioning)
        in: query
        name: status
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page (default: 10)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: List pipelines
      tags:
      - pipelines
    post:
      consumes:
      - application/json
      description: Create a new pipeline configuration
      parameters:
      - description: Pipeline Config
        in: body
        name: pipeline
        required: true
        schema:
          $ref: '#/definitions/protocol.PipelineConfig'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/protocol.PipelineConfig'
        "429":
          description: too many requests
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Create pipeline
      tags:
      - pipelines
  /pipelines/{id}:
    delete:
      description: Delete a pipeline configuration and stop its worker
      parameters:
      - description: Pipeline ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - Bearer: []
      summary: Delete pipeline
      tags:
      - pipelines
    get:
      description: Retrieve a specific pipeline configuration
      parameters:
      - description: Pipeline ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/protocol.PipelineConfig'
        "404":
          description: not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get pipeline
      tags:
      - pipelines
    put:
      consumes:
      - application/json
      description: Update an existing pipeline configuration
      parameters:
      - description: Pipeline ID
        in: path
        name: id
        required: true
        type: string
      - description: Pipeline Config
        in: body
        name: pipeline
        required: true
        schema:
          $ref: '#/definitions/protocol.PipelineConfig'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/protocol.PipelineConfig'
        "429":
          description: too many requests
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Update pipeline
      tags:
      - pipelines
  /pipelines/{id}/metrics:
    get:
      description: Server-Sent Events stream for pipeline status and stats
      parameters:
      - description: Pipeline ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - text/event-stream
      responses: {}
      security:
      - Bearer: []
      summary: Stream pipeline metrics
      tags:
      - pipelines
  /pipelines/{id}/restart:
    post:
      description: Trigger a manual restart/reload for a pipeline
      parameters:
      - description: Pipeline ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "202":
          description: Accepted
        "404":
          description: not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Restart pipeline
      tags:
      - pipelines
  /pipelines/{id}/status:
    get:
      description: Retrieve aggregated multi-table status and stats for a pipeline
      parameters:
      - description: Pipeline ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Get pipeline status
      tags:
      - pipelines
  /sinks:
    get:
      description: Retrieve all sink configurations
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/protocol.SinkConfig'
              type: array
            type: object
      security:
      - Bearer: []
      summary: List sinks
      tags:
      - sinks
    post:
      consumes:
      - application/json
      description: Create a new sink configuration
      parameters:
      - description: Sink Config
        in: body
        name: sink
        required: true
        schema:
          $ref: '#/definitions/protocol.SinkConfig'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/protocol.SinkConfig'
      security:
      - Bearer: []
      summary: Create sink
      tags:
      - sinks
  /sinks/{id}:
    delete:
      description: Delete a sink configuration
      parameters:
      - description: Sink ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - Bearer: []
      summary: Delete sink
      tags:
      - sinks
    get:
      description: Retrieve a specific sink configuration
      parameters:
      - description: Sink ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/protocol.SinkConfig'
        "404":
          description: not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get sink
      tags:
      - sinks
    put:
      consumes:
      - application/json
      description: Update an existing sink configuration
      parameters:
      - description: Sink ID
        in: path
        name: id
        required: true
        type: string
      - description: Sink Config
        in: body
        name: sink
        required: true
        schema:
          $ref: '#/definitions/protocol.SinkConfig'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/protocol.SinkConfig'
      security:
      - Bearer: []
      summary: Update sink
      tags:
      - sinks
  /sources:
    get:
      description: Retrieve all source configurations
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/protocol.SourceConfig'
              type: array
            type: object
      security:
      - Bearer: []
      summary: List sources
      tags:
      - sources
    post:
      consumes:
      - application/json
      description: Create a new source configuration
      parameters:
      - description: Source Config
        in: body
        name: source
        required: true
        schema:
          $ref: '#/definitions/protocol.SourceConfig'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/protocol.SourceConfig'
      security:
      - Bearer: []
      summary: Create source
      tags:
      - sources
  /sources/{id}:
    delete:
      description: Delete a source configuration
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - Bearer: []
      summary: Delete source
      tags:
      - sources
    get:
      description: Retrieve a specific source configuration
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/protocol.SourceConfig'
        "404":
          description: not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get source
      tags:
      - sources
    put:
      consumes:
      - application/json
      description: Update an existing source configuration
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      - description: Source Config
        in: body
        name: source
        required: true
        schema:
          $ref: '#/definitions/protocol.SourceConfig'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/protocol.SourceConfig'
      security:
      - Bearer: []
      summary: Update source
      tags:
      - sources
  /sources/{id}/schema:
    get:
      description: Discover available tables and schemas directly from the source
        database
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Get source schema
      tags:
      - sources
  /sources/{id}/tables:
    get:
      description: Retrieve all discovered tables and their metadata for a source
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/protocol.TableMetadata'
              type: array
            type: object
      security:
      - Bearer: []
      summary: List source tables
      tags:
      - sources
  /stats/history:
    get:
      description: Retrieve time-series data (Deprecated/Ditched)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/protocol.HistoryPoint'
            type: array
      security:
      - Bearer: []
      summary: Get metrics history
      tags:
      - stats
  /stats/summary:
    get:
      description: Retrieve multi-pipeline totals with lazy refresh (Optimized)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/protocol.StatsSummary'
      security:
      - Bearer: []
      summary: Get dashboard summary
      tags:
      - stats
  /workers/{id}/heartbeat:
    get:
      description: Retrieve heartbeat and uptime for a worker
      parameters:
      - description: Worker ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/protocol.WorkerHeartbeat'
      security:
      - Bearer: []
      summary: Get worker status
      tags:
      - workers
securityDefinitions:
  Bearer:
    description: Type "Bearer " followed by your JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
