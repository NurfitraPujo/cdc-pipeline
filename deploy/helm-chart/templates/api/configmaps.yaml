apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.api.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.api.name }}
    app.kubernetes.io/environment: {{ .Values.environment }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
{{- with .Values.api.env.configmap }}
data:
{{ toYaml . | indent 2 }}
{{- end }}
