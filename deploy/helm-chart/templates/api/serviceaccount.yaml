apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.api.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.api.name }}
    app.kubernetes.io/environment: {{ .Values.environment }}
  {{- with .Values.api.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
