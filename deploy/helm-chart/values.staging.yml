environment: staging

externalServices:
  - name: rds-postgres-main
    ip: 10.200.38.64
    port: 5432
  - name: dcs-redis-main
    ip: 10.200.49.78
    port: 6379

global:
  dnsConfig:
    options:
      - name: ndots
        value: "2"

sharedConfigs:
  secrets:
    ENCRYPTION_KEY: ""
    JWT_SECRET: ""
    DATABEND_DSN: ""
    NATS_URL: ""
    POSTGRES_PASSWORD: ""
  configs:
    ENV: "staging"
    LOG_LEVEL: "info"
    POSTGRES_SOURCE_HOST: "rds-postgres-main"
    POSTGRES_USER: "cdc-pipeline"
    POSTGRES_DB: "daya-core-staging"
    POSTGRES_DEBUG_HOST: "rds-postgres-main"
    POSTGRES_DEBUG_DB: "daya-core-staging"

api:
  name: cdc-api
  args: ["/app/api"]
  image:
    repository: swr.ap-southeast-3.myhuaweicloud.com/daya-engineering/cdc-data-pipeline
    tag: latest
    policy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  imagePullSecrets:
    - name: default-secret
  nodeSelector:
    node_type: spot
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: cdc-api
              app.kubernetes.io/environment: staging
  tolerantions: {}
  strategy: {}
  securityContext: {}
  podSecurityContext: {}
  podAnnotations: {}
  serviceAccount:
    annotations: {}
  hpa:
    enabled: false
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  ports:
    - containerPort: 8080
      name: http
      protocol: TCP
  services:
    - name: cdc-api
      port: 31121
      type: NodePort
      nodePort: 31121
  probe:
    livenessProbe:
      httpGet:
        path: /healthz
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 20
    readinessProbe:
      httpGet:
        path: /readyz
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
    terminationGracePeriodSeconds: 30
  ingress:
    enabled: true
    annotations:
      kubernetes.io/elb.acl-id: ""
      kubernetes.io/elb.class: union
      kubernetes.io/elb.id: 99ed1830-9f66-4ba4-84e2-3d1b819eaf55
      kubernetes.io/elb.port: "443"
      kubernetes.io/elb.tls-certificate-ids: ef8353e34fcd412699b149970aca8995,ef8353e34fcd412699b149970aca8995
    hosts:
      - host: api-cdc-stg.daya.ai
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: cdc-api
                port:
                  number: 31121
            property:
              ingress.beta.kubernetes.io/url-match-mode: STARTS_WITH
  env:
    configmap:
      PORT: "8080"
    secrets: {}

worker:
  name: cdc-worker
  args: ["/app/worker"]
  image:
    repository: swr.ap-southeast-3.myhuaweicloud.com/daya-engineering/cdc-data-pipeline
    tag: latest
    policy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  imagePullSecrets:
    - name: default-secret
  nodeSelector:
    node_type: spot
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: cdc-worker
              app.kubernetes.io/environment: staging
  tolerantions: {}
  strategy: {}
  securityContext: {}
  podSecurityContext: {}
  podAnnotations: {}
  serviceAccount:
    annotations: {}
  hpa:
    enabled: false
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 80
  ports:
    - containerPort: 8081
      name: metrics
      protocol: TCP
  services:
    - name: cdc-worker
      port: 8081
      type: ClusterIP
  probe:
    livenessProbe:
      httpGet:
        path: /healthz
        port: 8081
      initialDelaySeconds: 15
      periodSeconds: 20
    readinessProbe:
      httpGet:
        path: /readyz
        port: 8081
      initialDelaySeconds: 5
      periodSeconds: 10
    terminationGracePeriodSeconds: 30
  env:
    configmap:
      HEALTH_PORT: "8081"
      WORKER_GROUP: "staging"
    secrets: {}

web:
  name: cdc-web-dashboard
  image:
    repository: swr.ap-southeast-3.myhuaweicloud.com/daya-engineering/cdc-web-dashboard
    tag: latest
    policy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  imagePullSecrets:
    - name: default-secret
  nodeSelector:
    node_type: spot
  affinity: {}
  tolerantions: {}
  strategy: {}
  securityContext: {}
  podSecurityContext: {}
  podAnnotations: {}
  serviceAccount:
    annotations: {}
  ports:
    - containerPort: 3000
      name: http
      protocol: TCP
  services:
    - name: cdc-web-dashboard
      port: 31122
      type: NodePort
      nodePort: 31122
  ingress:
    enabled: true
    annotations:
      kubernetes.io/elb.acl-id: ""
      kubernetes.io/elb.class: union
      kubernetes.io/elb.id: 99ed1830-9f66-4ba4-84e2-3d1b819eaf55
      kubernetes.io/elb.port: "443"
      kubernetes.io/elb.tls-certificate-ids: ef8353e34fcd412699b149970aca8995,ef8353e34fcd412699b149970aca8995
    hosts:
      - host: cdc-stg.daya.ai
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: cdc-web-dashboard
                port:
                  number: 31122
            property:
              ingress.beta.kubernetes.io/url-match-mode: STARTS_WITH
  env:
    configmap:
      VITE_API_BASE_URL: "https://cdc-api-staging.daya.ai/api/v1"
      VITE_INTERNAL_API_BASE_URL: "http://cdc-api:80/api/v1"
    secrets: {}
